<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>जत्रा उत्सव - डिजिटल गॅलरी</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/style/css/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; background-color: #fefaf6; }
  </style>
</head>
<body class="bg-[#fefaf6] min-h-screen pb-10">

  <div class="bg-gradient-to-r from-[#ea580c] to-[#f59e0b] p-4 text-center text-white shadow-md sticky top-0 z-40">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
      <a href="index.html" class="flex items-center justify-center w-9 h-9 bg-white/20 rounded-full hover:bg-white/30 text-white transition-all">
        <i class="bi bi-arrow-left text-lg"></i>
      </a>
      
      <h2 class="text-lg sm:text-xl font-bold tracking-wide flex items-center gap-2">
        📸 जत्रा उत्सव - आठवणींची गॅलरी
      </h2>
      
      <div class="w-9"></div>
    </div>
  </div>

  <div class="max-w-6xl mx-auto px-4 mt-6">
    <p class="text-center text-gray-500 text-xs sm:text-sm mb-6">🚩 श्री जागेवाला बाबा जत्रेच्या मागील वर्षांतील काही सुवर्ण क्षण आणि आठवणी</p>
    
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 sm:gap-4">
      
      <div class="bg-white rounded-2xl shadow-md border border-orange-100 overflow-hidden group cursor-pointer transform transition-all duration-300 hover:-translate-y-1" onclick="openLightbox('./assets/gallery/photo1.jpg')">
        <div class="aspect-square w-full overflow-hidden bg-gray-100 relative">
          <img src="./assets/gallery/photo1.jpg" alt="जत्रा आठवणी" class="w-full h-full object-cover group-hover:scale-105 transition-all duration-500" onerror="this.src='https://placehold.co/600x600/ea580c/white?text=Jatra+Photo'">
          <div class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition-all flex items-center justify-center">
            <i class="bi bi-eye-fill text-white text-2xl"></i>
          </div>
        </div>
      </div>

      <div class="bg-white rounded-2xl shadow-md border border-orange-100 overflow-hidden group cursor-pointer transform transition-all duration-300 hover:-translate-y-1" onclick="openLightbox('./assets/gallery/photo2.jpg')">
        <div class="aspect-square w-full overflow-hidden bg-gray-100 relative">
          <img src="./assets/gallery/photo2.jpg" alt="जत्रा आठवणी" class="w-full h-full object-cover group-hover:scale-105 transition-all duration-500" onerror="this.src='https://placehold.co/600x600/ea580c/white?text=Jatra+Photo'">
          <div class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition-all flex items-center justify-center">
            <i class="bi bi-eye-fill text-white text-2xl"></i>
          </div>
        </div>
      </div>

      <div class="bg-white rounded-2xl shadow-md border border-orange-100 overflow-hidden group cursor-pointer transform transition-all duration-300 hover:-translate-y-1" onclick="openLightbox('./assets/gallery/photo3.jpg')">
        <div class="aspect-square w-full overflow-hidden bg-gray-100 relative">
          <img src="./assets/gallery/photo3.jpg" alt="जत्रा आठवणी" class="w-full h-full object-cover group-hover:scale-105 transition-all duration-500" onerror="this.src='https://placehold.co/600x600/ea580c/white?text=Jatra+Photo'">
          <div class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition-all flex items-center justify-center">
            <i class="bi bi-eye-fill text-white text-2xl"></i>
          </div>
        </div>
      </div>

      </div>
  </div>

  <div id="lightbox" class="fixed inset-0 bg-black/95 hidden z-50 flex flex-col items-center justify-center p-4" onclick="closeLightbox()">
    <button class="absolute top-4 right-4 text-white text-3xl hover:text-gray-300">
      <i class="bi bi-x-circle-fill"></i>
    </button>
    <img id="lightbox-img" src="" alt="मोठा फोटो" class="max-w-full max-h-[85vh] rounded-xl object-contain shadow-2xl animate-fade-in">
  </div>

  <script>
    // लाईटबॉक्स उघडणे
    function openLightbox(imgSrc) {
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightbox-img');
      lightboxImg.src = imgSrc;
      lightbox.classList.remove('hidden');
      document.body.style.overflow = 'hidden'; // स्क्रोलिंग बंद करणे
    }

    // लाईटबॉक्स बंद करणे
    function closeLightbox() {
      const lightbox = document.getElementById('lightbox');
      lightbox.classList.add('hidden');
      document.body.style.overflow = ''; // स्क्रोलिंग पुन्हा सुरू करणे
    }
  </script>

</body>
</html>
