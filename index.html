 <!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>श्री जागेवाला बाबा जत्रा २०२६</title>
  
  <!-- 🎯 कडक फेव्हिकॉन आयकॉन्स (Favicon Settings) -->
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/splash/splash_jatra.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./assets/splash/splash_jatra.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/splash/splash_jatra.png">

  <!-- PWA Manifest Link -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ea580c">
  
  <!-- Tailwind CSS & Icons -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/style/css/bootstrap-icons.min.css">
  
  <style>
    iframe { width: 100%; height: 100vh; border: none; }
    body, html { margin: 0; padding: 0; overflow: hidden; height: 100%; background-color: #ea580c; }
    
    /* 🖼️ तुमच्या नवीन assets फोल्डरमधील फुल स्क्रीन बॅकग्राउंड फोटो */
    .full-splash {
      background-image: url('./assets/splash/splash_jatra.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
  </style>
</head>
<body>

  <!-- 💥 १. कडक डिजिटल स्प्लॅश स्क्रीन (आता पूर्णपणे तुमच्या फोटोसह) -->
  <div id="splash-screen" class="fixed inset-0 full-splash flex flex-col items-center justify-between z-50 transition-all duration-700">
    
    <!-- वरची मोकळी जागा डिझाईन बॅलन्स करण्यासाठी -->
    <div></div>
    
    <!-- ⚙️ तळाशी फिरणारा मॉडर्न लोडिंग स्पिनर (बॅकग्राउंड ब्लर इफेक्टसह जेणेकरून फोटोवर उठून दिसेल) -->
<div class="mb-16 flex items-center gap-2 px-4 py-2 bg-black/40 backdrop-blur-sm rounded-full text-white text-xs font-semibold tracking-wide shadow-lg">
  
  <img src="./assets/splash/splash_jatra.png" alt="Loading" 
       class="animate-spin h-5 w-5 rounded-full object-cover border border-white/50">
  
  डिजिटल फॉर्म लोड होत आहे...
</div>
  </div>

  <!-- 💻 २. मुख्य गुगल वेब ॲप फॉर्म (Iframe मध्ये) -->
 <div id="app-content" class="hidden h-full w-full flex flex-col">
    
    <!-- 🎪 वरची कायम फिक्स राहणारी कडक गॅलरी लिंक पट्टी -->
    <div class="bg-gradient-to-r from-[#ea580c] to-[#f59e0b] p-2 flex justify-between items-center px-4 shadow-md z-40">
      <span class="text-xs sm:text-sm font-bold text-white tracking-wide">
        🚩 श्री जागेवाला बाबा उत्सव २०२६
      </span>
      <!-- 📸 गॅलरीकडे जाणारे कडक बटन -->
      <a href="gallery.html" class="inline-flex items-center gap-1 text-[10px] sm:text-xs font-extrabold text-orange-700 bg-white hover:bg-orange-50 px-2.5 py-1 rounded-full shadow transition-all active:scale-95 animate-pulse">
        <i class="bi bi-images"></i> गॅलरी पहा ➔
      </a>
    </div>
    <!-- 🔴 'src' च्या जागी तुमच्या मुख्य गुगल वेब ॲपची (.../exec) लिंक टाका भाऊ! -->
    <iframe src="https://script.google.com/macros/s/AKfycbxhhdRsqvN8ttqbPukPs0LmueZfr5GfCPk-J2sB8mlj4OohEpvegtvfVkWZdmYk-W7E/exec"></iframe>
  </div>

  <script>
    // ⏰ ३ सेकंदानंतर स्प्लॅश स्क्रीन गायब करून फॉर्म दाखवणे
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash-screen');
        const content = document.getElementById('app-content');
        
        splash.classList.add('opacity-0', 'scale-105');
        content.classList.remove('hidden');
        
        // पूर्णपणे डोममधून काढणे
        setTimeout(() => splash.remove(), 700);
      }, 3000); // ३००० मिलिसेकंद = ३ सेकंद स्प्लॅश स्क्रीन दिसेल
    });

    // 📱 PWA सर्व्हिस वर्कर रजिस्ट्रेशन
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('PWA Service Worker Registered Successfully!'))
          .catch(err => console.log('Service Worker Registration Failed:', err));
      });
    }
  </script>
</body>
</html>
